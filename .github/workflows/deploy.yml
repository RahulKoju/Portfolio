name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 3.108.40.234 >> ~/.ssh/known_hosts

      - name: Pull latest changes on server
        run: |
          ssh ubuntu@3.108.40.234 << 'EOF'
            set -e
            cd /home/ubuntu/deploy-testing/Portfolio
            git fetch origin main
            git reset --hard origin/main
          EOF

      - name: Deploy to server
        run: |
          ssh ubuntu@3.108.40.234 << 'EOF'
            set -e
            cd ~
            ./deploy.sh
          EOF
